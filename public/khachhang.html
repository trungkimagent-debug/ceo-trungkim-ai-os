<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <script>
  window.__TK_APP_VERSION__ = "v20260418_231043";
  window.__TK_RT_ROLLOUT__ = {
    enabled: true,
    pageId: "khachhang",
    checkMs: 15000,

    versionUrl: "./version.json"

  <title>Đánh giá nhân viên · Trung Hậu Kim Dung</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

    html{height:100%;overflow:hidden}
    body{
      height:100%;overflow:hidden;
      font-family:'Inter',system-ui,sans-serif;
      background:#07070f;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    body::before{
      content:'';
      position:fixed;inset:0;
      background:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(251,191,36,.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(249,115,22,.07) 0%, transparent 55%),
        #07070f;
      pointer-events:none;z-index:0;
    }

    /* ─── CARD ─── */
    .card{
      position:relative;z-index:1;
      width:100%;max-width:480px;
      height:100vh;height:100dvh;
      display:flex;flex-direction:column;
      overflow:hidden;
    }
    .card-inner{
      flex:1;
      padding:clamp(16px,3vw,28px) clamp(16px,4vw,28px);
      display:flex;flex-direction:column;
      gap:0;
      overflow:hidden;
    }
    @media(min-width:520px){
      body{padding:0;}
      .card{
        height:100vh;height:100dvh;
        border-left:1px solid rgba(255,255,255,.15);
        border-right:1px solid rgba(255,255,255,.15);
        background:rgba(10,10,18,.98);
      }
    }

    /* ─── HEADER ─── */
    .hd{
      display:flex;align-items:center;gap:0;
      margin-bottom:14px;
      padding-bottom:14px;
      border-bottom:1px solid rgba(255,255,255,.15);
    }
    .hd-logo{
      width:48px;height:48px;border-radius:14px;
      overflow:hidden;flex-shrink:0;
      box-shadow:0 0 0 2px rgba(251,191,36,.25), 0 6px 16px rgba(251,191,36,.2);
    }
    .hd-logo img{width:100%;height:100%;object-fit:cover;display:block;}
    .hd-text{flex:1;padding:0 12px;}
    .hd-name{
      font-size:17px;font-weight:900;letter-spacing:-.01em;
      background:linear-gradient(110deg,#fde68a 0%,#fbbf24 45%,#f97316 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      line-height:1.15;
    }
    .hd-sub{font-size:11px;color:rgba(255,255,255,.38);margin-top:3px;font-weight:500;letter-spacing:.02em;}
    .hd-badge{
      flex-shrink:0;
      background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(249,115,22,.08));
      border:1px solid rgba(251,191,36,.2);
      border-radius:8px;padding:4px 8px;
      font-size:10px;font-weight:700;letter-spacing:.1em;
      color:rgba(251,191,36,.8);text-transform:uppercase;
    }

    /* ─── STAFF CARD ─── */
    .staff-card{
      display:flex;align-items:center;gap:12px;
      background:rgba(255,255,255,.05);
      border:1.5px solid rgba(251,191,36,.18);
      border-radius:16px;
      padding:12px 16px;
      margin-bottom:16px;
    }
    .staff-av{
      width:40px;height:40px;border-radius:13px;
      background:linear-gradient(135deg,rgba(251,191,36,.25),rgba(249,115,22,.18));
      border:1px solid rgba(251,191,36,.3);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;font-size:18px;
    }
    .staff-info{flex:1;min-width:0;display:flex;align-items:center;gap:8px;}
    .staff-name{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .staff-sub{font-size:11px;color:#f97316;font-weight:600;margin-left:auto;white-space:nowrap;flex-shrink:0;}

    .sec-label{
      font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      color:rgba(255,255,255,.3);margin-bottom:10px;
    }
    .stars-section{margin-bottom:12px;}
    .stars-row{
      display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
      margin-bottom:10px;
    }
    .star-opt{position:relative;}
    .star-opt input{position:absolute;opacity:0;pointer-events:none;}
    .star-btn{
      width:100%;aspect-ratio:1;
      border-radius:14px;
      border:1.5px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.05);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      cursor:pointer;
      transition:all .18s cubic-bezier(.34,1.56,.64,1);
      gap:2px;
    }
    .s-icon{font-size:clamp(18px,5vw,24px);line-height:1;filter:grayscale(1) opacity(.35);transition:filter .18s;}
    .s-num{font-size:10px;font-weight:800;color:rgba(255,255,255,.25);transition:color .18s;}
    .star-opt input:checked + .star-btn{
      background:rgba(251,191,36,.14);
      border-color:rgba(251,191,36,.55);
      box-shadow:0 0 0 3px rgba(251,191,36,.1), 0 8px 20px rgba(251,191,36,.22);
      transform:translateY(-3px) scale(1.07);
    }
    .star-opt input:checked + .star-btn .s-icon{filter:drop-shadow(0 0 6px rgba(251,191,36,.5));}
    .star-opt input:checked + .star-btn .s-num{color:rgba(255,200,0,.9);}
    .star-feedback{
      display:flex;align-items:center;justify-content:center;gap:8px;
      padding:8px 14px;
      background:rgba(251,191,36,.06);
      border:1px solid rgba(251,191,36,.12);
      border-radius:12px;
      min-height:38px;
      transition:.2s;
    }
    .sf-emoji{font-size:18px;}
    .sf-text{font-size:13px;font-weight:700;color:rgba(255,225,100,.85);}

    .div{height:1px;background:rgba(255,255,255,.12);margin:12px 0;}
    .fields-section{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;flex:1;min-height:0;}
    .field-wrap{position:relative;}
    .field-icon{
      position:absolute;left:14px;top:50%;transform:translateY(-50%);
      color:rgba(255,255,255,.2);font-size:13px;pointer-events:none;
    }
    .textarea-icon{top:14px;transform:none;}
    input[type=text],textarea{
      width:100%;
      background:rgba(255,255,255,.05);
      border:1.5px solid rgba(255,255,255,.25);
      border-radius:14px;
      padding:12px 14px 12px 38px;
      font-size:14px;font-family:inherit;font-weight:500;
      color:#fff;outline:none;
      transition:border-color .15s,background .15s,box-shadow .15s;
      -webkit-appearance:none;
    }
    input[type=text]:focus,textarea:focus{
      border-color:rgba(251,191,36,.55);
      background:rgba(251,191,36,.05);
      box-shadow:0 0 0 3px rgba(251,191,36,.09);
    }
    input::placeholder,textarea::placeholder{color:rgba(255,255,255,.2);font-weight:400;}
    #customerName{
      background:rgba(251,191,36,.08);
      border-color:rgba(251,191,36,.45);
      box-shadow:0 0 0 2px rgba(251,191,36,.12);
      font-weight:700;
    }
    #customerName::placeholder{
      color:rgba(255,236,173,.9);
      font-weight:600;
    }
    #customerName:focus{
      border-color:rgba(251,191,36,.9);
      background:rgba(251,191,36,.12);
      box-shadow:0 0 0 3px rgba(251,191,36,.2);
    }
    textarea{padding-top:12px;min-height:0;flex:1;resize:none;line-height:1.5;}

    /* ─── BTN ─── */
    #btnSubmit{
      width:100%;flex-shrink:0;
      padding:14px;border:none;border-radius:16px;
      background:linear-gradient(135deg,#fde68a 0%,#fbbf24 40%,#f97316 100%);
      color:#1a0f00;font-size:15px;font-weight:900;
      letter-spacing:.03em;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      box-shadow:0 12px 30px rgba(251,191,36,.3);
      transition:all .18s;
      position:relative;overflow:hidden;
    }
    #btnSubmit::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 100%);
      pointer-events:none;
    }
    #btnSubmit:active{transform:scale(.97);box-shadow:0 8px 20px rgba(251,191,36,.2);}
    #btnSubmit:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none;}

    /* ─── ERR ─── */
    #errBox{
      margin-top:12px;padding:12px 16px;
      border-radius:14px;border:1px solid rgba(239,68,68,.3);
      background:rgba(239,68,68,.08);color:#fca5a5;
      font-size:13px;font-weight:500;display:none;
      line-height:1.5;
    }

    /* ─── DONE ─── */
    #doneBox{
      display:none;
      flex:1;align-items:center;justify-content:center;
      flex-direction:column;
      text-align:center;padding:40px 20px;
    }
    .done-ring{
      width:96px;height:96px;border-radius:50%;
      background:linear-gradient(135deg,rgba(34,197,94,.15),rgba(16,185,129,.1));
      border:2px solid rgba(34,197,94,.3);
      box-shadow:0 0 0 12px rgba(34,197,94,.06), 0 20px 50px rgba(34,197,94,.2);
      display:flex;align-items:center;justify-content:center;
      font-size:42px;margin:0 auto 24px;
    }
    .done-title{font-size:26px;font-weight:900;margin-bottom:8px;letter-spacing:-.01em;}
    .done-sub{font-size:14px;color:rgba(255,255,255,.4);line-height:1.7;font-weight:400;}

    /* ─── RESPONSIVE ─── */
    @media(max-width:360px){
      .card-inner{padding:14px 12px 18px;}
      .hd-name{font-size:15px;}
      .stars-row{gap:5px;}
      .star-btn{border-radius:12px;}
      input[type=text],textarea{padding:10px 12px 10px 34px;font-size:13px;}
      #btnSubmit{padding:12px;font-size:14px;}
    }
    @media(min-height:750px){
      .stars-section{margin-bottom:16px;}
      .div{margin:16px 0;}
      .fields-section{gap:12px;margin-bottom:16px;}
    }
  </style>
</head>
<body>
<div class="card">
<div class="card-inner">

  <!-- Header -->
  <div class="hd">
    <div class="hd-logo"><img src="./logo-thkd.jpg" alt="THKD" /></div>
    <div class="hd-text">
      <div class="hd-name">Trung Hậu Kim Dung</div>
      <div class="hd-sub">Đánh giá nhân viên phục vụ</div>
    </div>
    <div class="hd-badge">THKD</div>
  </div>

  <!-- Staff -->
  <div class="staff-card">
    <div class="staff-av">👤</div>
    <div class="staff-info">
      <div class="staff-name" id="staffName">Nhân viên</div>
      <div class="staff-sub" id="staffHint"></div>
    </div>
  </div>

  <!-- FORM -->
  <div id="formBox" style="display:flex;flex-direction:column;flex:1;">

    <!-- Stars -->
    <div class="stars-section">
      <div class="sec-label">Hôm nay nhân viên phục vụ anh/chị thế nào?</div>
      <div class="stars-row">
        <label class="star-opt">
          <input type="radio" name="stars" value="1" />
          <div class="star-btn"><span class="s-icon">⭐</span><span class="s-num">1</span></div>
        </label>
        <label class="star-opt">
          <input type="radio" name="stars" value="2" />
          <div class="star-btn"><span class="s-icon">⭐</span><span class="s-num">2</span></div>
        </label>
        <label class="star-opt">
          <input type="radio" name="stars" value="3" />
          <div class="star-btn"><span class="s-icon">⭐</span><span class="s-num">3</span></div>
        </label>
        <label class="star-opt">
          <input type="radio" name="stars" value="4" />
          <div class="star-btn"><span class="s-icon">⭐</span><span class="s-num">4</span></div>
        </label>
        <label class="star-opt">
          <input type="radio" name="stars" value="5" checked />
          <div class="star-btn"><span class="s-icon">⭐</span><span class="s-num">5</span></div>
        </label>
      </div>
      <div class="star-feedback" id="starFeedback">
        <span class="sf-emoji">🤩</span>
        <span class="sf-text">Rất hài lòng</span>
      </div>
    </div>

    <div class="div"></div>

    <!-- Fields -->
    <div class="fields-section">
      <div class="field-wrap">
        <i class="fa-solid fa-user field-icon"></i>
        <input id="customerName" type="text" placeholder="Nhập TÊN KHÁCH HÀNG" autocomplete="name" />
      </div>
      <div class="field-wrap">
        <i class="fa-solid fa-phone field-icon"></i>
        <input id="customerPhone" type="text" inputmode="numeric" placeholder="Số điện thoại (không bắt buộc)" autocomplete="tel" />
      </div>
      <div class="field-wrap">
        <i class="fa-solid fa-comment field-icon textarea-icon"></i>
        <textarea id="comment" placeholder="Nhận xét thêm (không bắt buộc)"></textarea>
      </div>
    </div>

    <button id="btnSubmit">
      <i class="fa-solid fa-paper-plane"></i> Gửi đánh giá
    </button>

    <div id="errBox"></div>
  </div>

  <!-- Done -->
  <div id="doneBox">
    <div class="done-ring">✓</div>
    <div class="done-title">Cảm ơn anh/chị! 💛</div>
    <div class="done-sub">Đánh giá của anh/chị đã được ghi nhận.<br/>Chúng tôi sẽ ngày càng phục vụ tốt hơn.</div>
  </div>

</div>
</div>

<script>
  const _fb = {
    1:{e:'😞',t:'Cần cải thiện'},
    2:{e:'😐',t:'Chưa hài lòng'},
    3:{e:'🙂',t:'Tạm được'},
    4:{e:'😊',t:'Hài lòng'},
    5:{e:'🤩',t:'Rất hài lòng'}
  };
  document.querySelectorAll('input[name="stars"]').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const el=document.getElementById('starFeedback');
      const f=_fb[Number(inp.value)];
      if(el&&f) el.innerHTML=`<span class="sf-emoji">${f.e}</span><span class="sf-text">${f.t}</span>`;
    });
  });
</script>
<script type="module" src="./khachhang.js?v20260424_213649"></script>
</body>
</html>
