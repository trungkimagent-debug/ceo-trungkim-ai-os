          hour: "2-digit",

        const hh = Number(parts.find((p) => p.type === "hour")?.value || 0);

      const buildEmptyShiftTimes = () => ({

      const getActualMinutesForShift = (data, sid, rawPunchIns, nowMinutesOverride = null) => {

        // Siết cửa sổ theo đúng ca để tránh ca chiều ăn nhầm mốc vào của ca trước
        const EARLY_TOLERANCE_MIN = 60;  // chỉ cho phép vào sớm tối đa 60'

        const shifts = Array.isArray(data?.shifts) ? data.shifts : [];
        const previousShiftEnds = shifts
          .filter((otherSid) => otherSid !== sid)
          .map((otherSid) => {
            const otherRule = SHIFT_RULES[otherSid] || {};
            const otherStart = toMinutes(String(times[otherSid]?.start || otherRule?.min || ""));
            const otherEnd = toMinutes(String(times[otherSid]?.end || otherRule?.max || ""));
            return { otherStart, otherEnd };

          .filter((x) => Number.isFinite(x.otherStart) && Number.isFinite(x.otherEnd) && x.otherStart < startMin)

            const otherStart = toMinutes(String(times[otherSid]?.start || otherRule?.min || ""));
            return otherStart;

          .filter((otherStart) => Number.isFinite(otherStart) && otherStart > startMin);
        const nextEarliestStart = nextShiftStarts.length ? Math.min(...nextShiftStarts) : null;

        const defaultWindowEnd = Math.min(24 * 60 - 1, endMin + LATE_TOLERANCE_MIN);
        const windowEnd = Number.isFinite(nextEarliestStart)
          ? Math.min(defaultWindowEnd, nextEarliestStart - 5)
          : defaultWindowEnd;
        const inShiftWindow = punchMins.filter((m) => m >= windowStart && m <= windowEnd);
        if (inShiftWindow.length) return inShiftWindow[0];

        const nowMin = Number.isFinite(nowMinutesOverride) ? nowMinutesOverride : getNowMinutesHCM();
        if (Number.isFinite(nowMin) && nowMin < startMin) return null;
        return null;

      const hasPunchInLaterShift = (data, sid, rawPunchIns) => {

        const shifts = Array.isArray(data?.shifts) ? data.shifts : [];

        const currentStart = toMinutes(String(times[sid]?.start || currentRule?.min || ""));

        const nextShiftStarts = shifts

        if (!punchMins.length) return false;

      const getNextShiftStartMin = (data, sid) => {

      const getShiftTimeText = (data, sid) => {

        const parsed = shifts

        const now = Number.isFinite(nowMinutes) ? nowMinutes : getNowMinutesHCM();

              const applyUpsert = (day, staffId, row) => {
                const prevDay = next[day] || {};
                const prevRow = prevDay[staffId];
                if (
                  prevRow &&
                  prevRow.isOff === row.isOff &&
                  JSON.stringify(prevRow.shifts || []) === JSON.stringify(row.shifts || []) &&
                  JSON.stringify(prevRow.shiftTimes || {}) === JSON.stringify(row.shiftTimes || {}) &&

                ) {
                  return;

                if (next === prev) next = { ...prev };
                next[day] = { ...prevDay, [staffId]: row };

                const prevDay = next[day];

                const dayClone = { ...prevDay };

                  if (a.length !== b.length) return false;
                  for (let i = 0; i < a.length; i += 1) {

      useEffect(() => {
        if (!db || !canEditSummaryFilter) return;
        const ref = db.collection(UI_PREFS_COLLECTION).doc(SUMMARY_VISIBLE_DOC);
        const timer = setTimeout(() => {
          ref.set(
            {
              ids: summaryVisibleIds || {},
              roles: summaryRoles || {},
              updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
            },
            { merge: true }
          ).catch((err) => console.error("Save summary visible prefs error:", err));
        }, 550);
        return () => clearTimeout(timer);
      }, [summaryVisibleIds, summaryRoles, canEditSummaryFilter]);

      useEffect(() => {
        const raw = scheduleData[selectedDate]?.[activeUser] || {};
        const shifts = Array.isArray(raw.shifts) ? raw.shifts : [];
        if (!shifts.length) {
          setActiveShiftId("");
          return;
        }
        if (!activeShiftId || !shifts.includes(activeShiftId)) {
          setActiveShiftId(shifts[0]);
        }
      }, [selectedDate, activeUser, scheduleData, activeShiftId]);
      useEffect(() => {
        if (selectedDate < todayIso) setSelectedDate(todayIso);
      }, [selectedDate, todayIso]);
      useEffect(() => {
        if (!db || !activeUser || !selectedDate) return;
        const week = getWeekDays(selectedDate);
        if (!week.length) return;
        const mondayIso = week[0].iso;
        if (mondayIso <= todayIso) return;
        const lockKey = `${activeUser}__${mondayIso}`;
        if (autoCloneWeekRef.current.has(lockKey)) return;
        autoCloneWeekRef.current.add(lockKey);

        (async () => {
          for (const d of week) {
            if (scheduleData[d.iso]?.[activeUser]) continue;
            const prevIso = shiftIsoDays(d.iso, -7);
            const prevData = scheduleData[prevIso]?.[activeUser];
            if (!prevData) continue;
            const payload = {
              day: d.iso,
              staffId: activeUser,
              isOff: !!prevData.isOff,
              shifts: Array.isArray(prevData.shifts) ? prevData.shifts : [],
              shiftTimes: ensureShiftTimes(prevData.shiftTimes || {}),
              offReason: String(prevData.offReason || ""),
              updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
            };
            try {
              await db.collection(SCHEDULE_COLLECTION).doc(`${d.iso}__${activeUser}`).set(payload, { merge: true });
            } catch (e) {
              console.error("Auto clone next-week schedule error:", e);
            }
          }
        })();
      }, [activeUser, selectedDate, scheduleData, todayIso]);
      useEffect(() => {
        if (!setupOpen) setOffReasonInvalid(false);
      }, [setupOpen, selectedDate, activeUser]);
      useEffect(() => {
        setOffReasonPreview(null);
      }, [selectedDate, offCalendarOpen, viewMode]);
      useEffect(() => {
        if (viewMode !== "summary" && summaryFullScreen) setSummaryFullScreen(false);
      }, [viewMode, summaryFullScreen]);
      useEffect(() => {
        const html = document.documentElement;
        if (!html) return;
        if (summaryFullScreen) {
          html.classList.add("thkd-hide-bottom-nav");
        } else {
          html.classList.remove("thkd-hide-bottom-nav");
        }
        return () => {
          html.classList.remove("thkd-hide-bottom-nav");
        };
      }, [summaryFullScreen]);
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === "Escape") setSummaryFullScreen(false);
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      const showNotify = (msg) => {
        setNotification(msg);
        setTimeout(() => setNotification(null), 2500);
      };
      const persistSession = (next) => {
        if (!next) {
          localStorage.removeItem(LS_KEY_SESSION);
          setSession(null);
          return;
        }
        localStorage.setItem(LS_KEY_SESSION, JSON.stringify(next));
        setSession(next);
      };

      const handleLogin = async () => {
        setLoginError("");
        const id = String(loginId || "").trim();
        const pass = String(loginPassword || "").trim();

        if (!id || !pass) {
          setLoginError("Vui lòng nhập đầy đủ tài khoản và mật khẩu.");
          return;
        }
        if (!db) {
          setLoginError("Firebase chưa sẵn sàng.");
          return;
        }

        setLoginBusy(true);
        try {
          const snap = await db.collection("staffs").doc(id).get();
          if (!snap.exists) {
            setLoginError("Không tìm thấy nhân viên.");
            return;
          }
          const data = snap.data() || {};
          const realPass = String(data.loginPassword || "").trim();
          if (!realPass || realPass !== pass) {
            setLoginError("Mật khẩu không đúng.");
            return;
          }
          if (data.active === false) {
            setLoginError("Tài khoản đang bị khóa.");
            return;
          }

          const keepSessionId = session?.staffId === id ? session.sessionId : null;
          const roleRaw = String(data.role || data.position || data.title || data.chucVu || data.chucvu || "").trim();
          const roleText = roleRaw.toLowerCase();
          const summaryRole = String(summaryRoles[id] || "").trim().toLowerCase();
          const isManager = data.isManager === true || roleText.includes("quản lý") || roleText.includes("quan ly") || roleText.includes("manager") || summaryRole === "manager";
          const nextSession = {
            staffId: id,
            name: String(data.name || id),
            phone: String(data.phone || id),
            sessionId: keepSessionId || randomSessionId(),
            isPresident: id.toLowerCase() === PRESIDENT_EMAIL,
            isManager,
            role: summaryRole === "manager" ? "manager" : (roleRaw || (isManager ? "manager" : "staff"))
          };

          persistSession(nextSession);
          setActiveUser(id);
          setLoginPassword("");
          showNotify("Đăng nhập thành công");
        } catch (err) {
          console.error("Login error:", err);
          setLoginError("Có lỗi khi đăng nhập.");
        } finally {
          setLoginBusy(false);
        }
      };

      const handleLogout = () => {
        persistSession(null);
        setLoginId("");
        setLoginPassword("");
      };

      const handleUpdateSchedule = (update) => {
        if (!activeUser) return;
        setScheduleData((prev) => {
          const dayData = prev[selectedDate] || {};
          return {
            ...prev,
            [selectedDate]: {
              ...dayData,
              [activeUser]: { ...dayData[activeUser], ...update }
            }
          };
        });
      };

      const currentDayScheduleRaw = scheduleData[selectedDate]?.[activeUser] || {};
      const getDefaultEndForShift = (sid) => sid === "sang" ? "12:00" : (SHIFT_RULES[sid]?.max || "--:--");
      const currentDayShiftTimes = ensureShiftTimes(currentDayScheduleRaw.shiftTimes || {});
      (Array.isArray(currentDayScheduleRaw.shifts) ? currentDayScheduleRaw.shifts : []).forEach((sid) => {
        const rule = SHIFT_RULES[sid];
        if (!rule) return;
        const sm = toMinutes(currentDayShiftTimes[sid].start);
        const em = toMinutes(currentDayShiftTimes[sid].end);
        const min = toMinutes(rule.min);
        const max = toMinutes(rule.max);
        const defaultEnd = getDefaultEndForShift(sid);
        if (sm === null || sm < min || sm >= max) currentDayShiftTimes[sid].start = rule.min;
        const safeStartMin = toMinutes(currentDayShiftTimes[sid].start);
        if (em === null) {
          currentDayShiftTimes[sid].end = defaultEnd;
        } else if (safeStartMin === null || em <= safeStartMin || em > max) {
          currentDayShiftTimes[sid].end = rule.max;
        }
      });
      const currentDaySchedule = {
        isOff: !!currentDayScheduleRaw.isOff,
        shifts: Array.isArray(currentDayScheduleRaw.shifts) ? currentDayScheduleRaw.shifts : [],
        shiftTimes: currentDayShiftTimes,
        offReason: String(currentDayScheduleRaw.offReason || "")
      };
      const toggleShift = (shiftId) => {
        const picked = Array.isArray(currentDaySchedule.shifts) ? currentDaySchedule.shifts : [];
        const hasExclusive = picked.some((sid) => EXCLUSIVE_SHIFTS.has(sid));
        const applyRuleTimes = (nextShifts) => {
          const times = ensureShiftTimes(currentDaySchedule.shiftTimes);
          nextShifts.forEach((sid) => {
            const rule = SHIFT_RULES[sid];
            if (!rule) return;
            const sm = toMinutes(times[sid].start);
            const em = toMinutes(times[sid].end);
            const min = toMinutes(rule.min);
            const max = toMinutes(rule.max);
            const defaultEnd = getDefaultEndForShift(sid);
            if (sm === null || sm < min || sm >= max) times[sid].start = rule.min;
            const safeStartMin = toMinutes(times[sid].start);
            if (em === null) {
              times[sid].end = defaultEnd;
            } else if (safeStartMin === null || em <= safeStartMin || em > max) {
              times[sid].end = rule.max;
            }
          });
          return times;
        };
        if (EXCLUSIVE_SHIFTS.has(shiftId)) {
          if (picked.includes(shiftId)) {
            handleUpdateSchedule({ shifts: [], shiftTimes: ensureShiftTimes(currentDaySchedule.shiftTimes), isOff: false });
            setActiveShiftId("");
            return;
          }
          handleUpdateSchedule({ shifts: [shiftId], shiftTimes: applyRuleTimes([shiftId]), isOff: false });
          setActiveShiftId(shiftId);
          return;
        }
        if (hasExclusive && !picked.includes(shiftId)) {
          handleUpdateSchedule({ shifts: [shiftId], shiftTimes: applyRuleTimes([shiftId]), isOff: false });
          setActiveShiftId(shiftId);
          return;
        }
        if (picked.includes(shiftId)) {
          const next = picked.filter((s) => s !== shiftId);
          handleUpdateSchedule({ shifts: next, shiftTimes: applyRuleTimes(next), isOff: false });
          setActiveShiftId(next[0] || "");
          return;
        }
        const next = Array.from(new Set([...picked, shiftId]));
        handleUpdateSchedule({ shifts: next, shiftTimes: applyRuleTimes(next), isOff: false });
        setActiveShiftId(shiftId);
      };

      const getStartOptionsForShift = (sid) => {
        const rule = SHIFT_RULES[sid];
        if (!rule) return [];
        const min = toMinutes(rule.min);
        const max = toMinutes(rule.max);
        return TIME_OPTIONS.filter((t) => {
          const tm = toMinutes(t);
          return tm !== null && tm >= min && tm < max;
        });
      };
      const getEndOptionsForShift = (sid, startValue) => {
        const rule = SHIFT_RULES[sid];
        if (!rule) return [];
        const startMin = toMinutes(startValue);
        const max = toMinutes(rule.max);
        return TIME_OPTIONS.filter((t) => {
          const tm = toMinutes(t);
          return tm !== null && startMin !== null && tm > startMin && tm <= max;
        });
      };

      const handleShiftTimeChange = (value) => {
        if (!activeShiftId) return;
        const nextTimes = ensureShiftTimes(currentDaySchedule.shiftTimes);
        const rule = SHIFT_RULES[activeShiftId];
        const min = toMinutes(rule.min);
        const max = toMinutes(rule.max);
        const chosen = toMinutes(value);
        const currentEnd = toMinutes(nextTimes[activeShiftId].end);
        const nextStart = chosen !== null && chosen >= min && chosen < max ? value : rule.min;
        const nextStartMin = toMinutes(nextStart);
        const safeEnd = currentEnd !== null && currentEnd > nextStartMin && currentEnd <= max
          ? nextTimes[activeShiftId].end
          : rule.max;
        nextTimes[activeShiftId] = {
          start: nextStart,
          end: safeEnd
        };
        handleUpdateSchedule({ shiftTimes: nextTimes, isOff: false });
      };
      const handleShiftEndChange = (value) => {
        if (!activeShiftId) return;
        const nextTimes = ensureShiftTimes(currentDaySchedule.shiftTimes);
        const rule = SHIFT_RULES[activeShiftId];
        const startMin = toMinutes(nextTimes[activeShiftId].start);
        const endMin = toMinutes(value);
        const max = toMinutes(rule.max);
        nextTimes[activeShiftId] = {
          ...nextTimes[activeShiftId],
          end: endMin !== null && startMin !== null && endMin > startMin && endMin <= max ? value : rule.max
        };
        handleUpdateSchedule({ shiftTimes: nextTimes, isOff: false });
      };

      const applyFullDayPreset = () => {
        const nextTimes = ensureShiftTimes(currentDaySchedule.shiftTimes);
        nextTimes.cangay = { start: "07:00", end: "22:00" };
        handleUpdateSchedule({ isOff: false, shifts: ["cangay"], shiftTimes: nextTimes });
        setActiveShiftId("cangay");
      };

      const validateDaySchedule = (data) => {
        if (data.isOff) {
          if (!String(data.offReason || "").trim()) return "Vui lòng nhập lý do nghỉ.";
          return "";
        }
        const shifts = Array.isArray(data.shifts) ? data.shifts : [];
        if (!shifts.length) return "Chưa chọn ca.";
        if (shifts.includes("trua") && shifts.length > 1) return "Ca trưa chỉ được chọn 1 ca duy nhất.";
        const times = ensureShiftTimes(data.shiftTimes || {});
        for (const sid of shifts) {
          const rule = SHIFT_RULES[sid];
          const t = times[sid] || { start: "--:--", end: "--:--" };
          const sm = toMinutes(t.start);
          const em = toMinutes(t.end);
          if (sm === null || em === null) return `Ca ${getShiftLabel(sid)} chưa chọn đủ giờ.`;
          if (sm >= em) return `Ca ${getShiftLabel(sid)} có giờ vào không hợp lệ.`;
          const min = toMinutes(rule.min);
          const max = toMinutes(rule.max);
          if (sm < min || sm >= max) {
            return `Ca ${getShiftLabel(sid)} chỉ hợp lệ ${rule.min}-${rule.max}.`;
          }
          if (em > max) return `Ca ${getShiftLabel(sid)} chỉ hợp lệ ${rule.min}-${rule.max}.`;
        }
        return "";
      };

      const getAttendanceStatus = (data, rawPunchIns, nowMinutesOverride = null, preferredSid = "") => {
        if (data.isOff) return { key: "off", text: "OFF", icon: "fa-solid fa-bed", deltaLabel: "" };
        const shifts = Array.isArray(data.shifts) ? data.shifts : [];
        if (!shifts.length) return { key: "pending", text: "", icon: "fa-solid fa-clipboard", deltaLabel: "" };
        const nowMin = Number.isFinite(nowMinutesOverride) ? nowMinutesOverride : getNowMinutesHCM();
        const realtimeSid = getRealtimeShiftId(data, nowMin);
        const refSid = shifts.includes(preferredSid)
          ? preferredSid
          : (shifts.includes(realtimeSid) ? realtimeSid : shifts[0]);
        const shiftStatus = getShiftAttendanceStatus(data, refSid, rawPunchIns, nowMin);
        const iconByKey = {
          off: "fa-solid fa-bed",
          early: "fa-solid fa-arrow-up",
          ontime: "fa-solid fa-check",
          late: "fa-solid fa-hourglass-half",
          verylate: "fa-solid fa-triangle-exclamation",
          pending: shiftStatus.text ? "fa-regular fa-clock" : "fa-solid fa-clipboard"
        };
        return {
          key: shiftStatus.key,
          text: shiftStatus.text,
          deltaLabel: shiftStatus.deltaLabel || "",
          icon: iconByKey[shiftStatus.key] || "fa-regular fa-clock"
        };
      };
      const getShiftAttendanceStatus = (data, sid, rawPunchIns, nowMinutesOverride = null) => {
        if (data.isOff) return { key: "off", text: "OFF", deltaLabel: "" };
        const shifts = Array.isArray(data.shifts) ? data.shifts : [];
        if (!shifts.length || !shifts.includes(sid)) return { key: "pending", text: "", deltaLabel: "" };
        const times = ensureShiftTimes(data.shiftTimes || {});
        const rule = SHIFT_RULES[sid] || {};
        const startText = String(times[sid]?.start || rule?.min || "");
        const endText = String(times[sid]?.end || rule?.max || "");
        const plannedMin = toMinutes(startText);
        const endMin = toMinutes(endText);
        if (!Number.isFinite(plannedMin)) return { key: "pending", text: "Chưa có giờ vào", deltaLabel: "" };
        const nowMin = Number.isFinite(nowMinutesOverride) ? nowMinutesOverride : getNowMinutesHCM();
        const actualMin = getActualMinutesForShift(data, sid, rawPunchIns, nowMin);
        if (actualMin === null) {
          const isToday = selectedDate === getTodayIsoHCM();
          const isPastDate = selectedDate < getTodayIsoHCM();
          const nextShiftStart = getNextShiftStartMin(data, sid);
          const enteredNextShift = Number.isFinite(nextShiftStart) && Number.isFinite(nowMin) && nowMin >= (nextShiftStart - 5);
          const passedShiftEnd = Number.isFinite(endMin) && Number.isFinite(nowMin) && nowMin > endMin;

          // Ca quá khứ mà không check-in => OFF ngay.
          if (isPastDate) {
            return { key: "off", text: "OFF", deltaLabel: "" };
          }
          // Sang ca kế tiếp hoặc có check-in ở ca kế tiếp => ca hiện tại OFF.
          if (isToday && enteredNextShift) {
            return { key: "off", text: "OFF", deltaLabel: "" };
          }
          if (isToday && hasPunchInLaterShift(data, sid, rawPunchIns)) {
            return { key: "off", text: "OFF", deltaLabel: "" };
          }
          // Quá giờ kết thúc ca mà chưa check-in => OFF (áp dụng cho cả sáng/chiều).
          if (isToday && passedShiftEnd) {
            return { key: "off", text: "OFF", deltaLabel: "" };
          }
          if (isToday && nowMin !== null && nowMin < plannedMin) {
            return { key: "pending", text: "Chuẩn bị", deltaLabel: "" };
          }
          return { key: "verylate", text: "Chưa checkin", deltaLabel: "" };
        }
        const delta = actualMin - plannedMin;
        const absDelta = Math.abs(delta);
        if (delta < -5) return { key: "early", text: "Đi sớm", deltaLabel: `${absDelta}'` };
        if (delta < 5) return { key: "ontime", text: "Đúng giờ", deltaLabel: "" };
        if (delta === 5) return { key: "late", text: "Đi muộn", deltaLabel: `${absDelta}'` };
        return { key: "verylate", text: "Đi trễ", deltaLabel: `${absDelta}'` };
      };
      const summaryEmployees = employees
        .filter((e) => summaryVisibleIds[e.id] !== false)
        .sort((a, b) => {
          const aRow = scheduleData[selectedDate]?.[a.id] || {};
          const bRow = scheduleData[selectedDate]?.[b.id] || {};
          const aPunch = punchInTimesMap[a.id] || punchInMap[a.id];
          const bPunch = punchInTimesMap[b.id] || punchInMap[b.id];
          // Sắp xếp luôn theo trạng thái realtime mặc định, không phụ thuộc ca đang bấm xem
          const aStatus = getAttendanceStatus(aRow, aPunch, nowMinuteTick, "");
          const bStatus = getAttendanceStatus(bRow, bPunch, nowMinuteTick, "");
          const aHasShift = Array.isArray(aRow.shifts) && aRow.shifts.length > 0;
          const bHasShift = Array.isArray(bRow.shifts) && bRow.shifts.length > 0;
          const aIsOff = aRow.isOff === true;
          const bIsOff = bRow.isOff === true;

          const rank = (statusKey, hasShift, isOff) => {
            if (statusKey === "early") return 0;                      // Đi sớm
            if (statusKey === "ontime") return 1;                     // Đúng giờ
            if (statusKey === "late" || statusKey === "verylate") return 2; // Muộn/trễ
            if (hasShift) return 3;                                   // Có ca nhưng chưa vào/chuẩn bị
            if (isOff) return 4;                                      // OFF
            return 5;                                                 // Chưa đăng ký
          };
          const ra = rank(aStatus?.key, aHasShift, aIsOff);
          const rb = rank(bStatus?.key, bHasShift, bIsOff);
          if (ra !== rb) return ra - rb;
          return String(a.name || "").localeCompare(String(b.name || ""), "vi");
        });

      const saveScheduleNow = async () => {
        if (!db) {
          showNotify("Firebase chưa sẵn sàng.");
          return;
        }
        if (!activeUser) {
          showNotify("Chưa chọn nhân viên.");
          return;
        }
        const data = {
          isOff: !!currentDaySchedule.isOff,
          shifts: Array.isArray(currentDaySchedule.shifts) ? currentDaySchedule.shifts : [],
          shiftTimes: ensureShiftTimes(currentDaySchedule.shiftTimes || {}),
          offReason: String(currentDaySchedule.offReason || "").trim()
        };
        const err = validateDaySchedule(data);
        if (err) {
          if (data.isOff && !data.offReason) setOffReasonInvalid(true);
          showNotify(err);
          return;
        }
        setOffReasonInvalid(false);
        const payload = {
          day: selectedDate,
          staffId: activeUser,
          isOff: data.isOff,
          shifts: data.shifts,
          shiftTimes: data.shiftTimes,
          offReason: data.isOff ? data.offReason : "",
          updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
        };
        try {
          await db.collection(SCHEDULE_COLLECTION).doc(`${selectedDate}__${activeUser}`).set(payload, { merge: true });
          showNotify(`Đã lưu lịch của ${getEmployeeLabel(activeUser)}!`);
          setSetupOpen(false);
        } catch (e) {
          console.error("Save schedule error:", e);
          showNotify("Lưu lịch thất bại.");
        }
      };

      if (!session?.staffId) {
        return (
          <div className="login-screen">
            <div className="login-card">
              <div className="login-top">
                <div className="login-title"><i className="fa-solid fa-user-lock" style={{ color: "#fbbf24", marginRight: 8 }} />Đăng nhập lịch làm việc</div>
                <button className="icon-btn" onClick={() => location.href = "/?screen=star"} title="Về star"><i className="fa-solid fa-chart-column" /></button>
              </div>
              <div className="login-body">
                <div className="login-hint">Nhập tài khoản mật khẩu!</div>
                <input className="login-field" value={loginId} onChange={(e) => setLoginId(e.target.value)} placeholder="Nhập tài khoản..." />
                <input
                  className="login-field"
                  value={loginPassword}
                  onChange={(e) => setLoginPassword(e.target.value)}
                  type="password"
                  placeholder="Mật khẩu"
                  onKeyDown={(e) => { if (e.key === "Enter") handleLogin(); }}
                />
                {loginError ? <div className="err">{loginError}</div> : null}
                {staffError ? <div className="err" style={{ borderColor: "rgba(245,158,11,.5)", color: "#fde68a", background: "rgba(245,158,11,.1)" }}>{staffError}</div> : null}
                <button className="solid-btn" onClick={handleLogin} disabled={loginBusy || staffLoading}>
                  <i className="fa-solid fa-right-to-bracket" /> {loginBusy ? "Đang đăng nhập..." : "Đăng nhập"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="shell">
          {!summaryFullScreen ? (
            <header className="topbar">
              <div className="brand-left">
                <div className="brand-logo" />
                  <div style={{ minWidth: 0, lineHeight: 1.1 }}>
                    <div className="brand-name">TRUNG HẬU KIM DUNG</div>
                    <div className="brand-slogan">Lịch làm việc • {getCurrentMonthLabel()}</div>
                  </div>
                </div>
              <div className="head-right">
                {canSwitchUser ? (
                  <div className="staff-box" title="Chọn nhân viên để mở/sửa lịch">
                    <i className="fa-solid fa-user" style={{ color: "#fbbf24", fontSize: 12 }} />
                    <select className="staff-select" value={activeUser} onChange={(e) => setActiveUser(e.target.value)}>
                      {employees.map((emp) => (
                        <option key={emp.id} value={emp.id}>{emp.name}</option>
                      ))}
                    </select>
                  </div>
                ) : (
                  <div className="staff-pill" title="Tài khoản hiện tại">{getEmployeeLabel(activeUser || session?.staffId || "")}</div>
                )}
                <button className="icon-btn staff-link" onClick={() => location.href = "/?screen=star"} title="Về STAR">
                  <i className="fa-solid fa-arrow-left" />
                </button>
              </div>
            </header>
          ) : null}

          {!summaryFullScreen ? (
            <div className="toolbar">
              <div className="seg-row">
                <div className="seg">
                  <button className={`seg-btn ${viewMode === "personal" ? "active" : ""}`} onClick={() => setViewMode("personal")}><i className="fa-solid fa-user" /> Cá nhân</button>
                  <button className={`seg-btn ${viewMode === "summary" ? "active" : ""}`} onClick={() => setViewMode("summary")}><i className="fa-solid fa-table-list" /> Tổng hợp</button>
                  <button
                    className={`seg-btn ${viewMode === "off" ? "active" : ""}`}
                    onClick={() => {
                      setViewMode((v) => v === "off" ? "personal" : "off");
                      setOffCalendarOpen(false);
                    }}
                  ><i className="fa-solid fa-bed" /> OFF</button>
                </div>
              </div>
              <div className="toolbar-meta" />
            </div>
          ) : null}

          {viewMode === "personal" ? (
            <div className="content" style={{ gridTemplateColumns: "1fr" }}>
              <section className="card">
                <div className="card-head">
                  <i className="fa-solid fa-calendar-week" style={{ color: "#fbbf24" }} /> Lịch tuần • {getEmployeeLabel(activeUser)}
                  <div className="week-inline-nav">
                    <button className="week-inline-btn" type="button" title="Tuần này" onClick={() => setSelectedDate(getTodayIsoHCM())}><i className="fa-solid fa-rotate-left" /> Tuần này</button>
                    <button className="week-inline-btn" type="button" title="Tuần sau" onClick={() => {
                      const d = new Date(`${selectedDate}T00:00:00`);
                      d.setDate(d.getDate() + 7);
                      setSelectedDate(toIsoLocal(d));
                    }}><i className="fa-solid fa-chevron-right" /> Tuần sau</button>
                  </div>
                </div>
                <div className="card-body">
                  <div className="week-list">
                    {weekDays.map((d) => {
                      const data = scheduleData[d.iso]?.[activeUser] || { shifts: [], isOff: false, start: "--:--", end: "--:--" };
                      const orderedShifts = getOrderedShiftIds(data.shifts);
                      const note = data.isOff
                        ? "OFF"
                        : orderedShifts.length
                          ? `${orderedShifts.map((s) => getShiftLabel(s)).join(" • ")} • ${getAllShiftTimeText(data, false)}`
                          : "Chưa đăng ký";
                      return (
                        <button
                          key={d.iso}
                          className={`week-row ${selectedDate === d.iso ? "active" : ""}`}
                          disabled={d.iso < todayIso}
                          onClick={() => { setSelectedDate(d.iso); setSetupOpen(true); }}
                        >
                          <div className="week-row-top">
                            <span>{d.label}</span>
                            {data.isOff ? (
                              <span className="tag off"><i className="fa-solid fa-bed" /> OFF</span>
                            ) : data.shifts.length ? (
                              <span className="tag on"><i className="fa-solid fa-briefcase" /> Đi làm</span>
                            ) : (
                              <span style={{ color: "rgba(255,255,255,.45)", fontSize: 11 }}>-</span>
                            )}
                          </div>
                          <div className="week-row-note">{note}</div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </section>
            </div>
          ) : viewMode === "off" ? (
            <div className="content" style={{ gridTemplateColumns: "1fr" }} onClick={() => setOffCalendarOpen(false)}>
              <section className="card" onClick={(e) => e.stopPropagation()}>
                <div className="card-head">
                  <i className="fa-solid fa-bed" style={{ color: "#fbbf24" }} /> CHỌN NGÀY OFF • {getEmployeeLabel(activeUser)} - {new Date(`${selectedDate.slice(0, 7)}-01T00:00:00`).toLocaleDateString("vi-VN", { month: "2-digit", year: "numeric" })}
                </div>
                <div className="card-body">
                  <div className="off-cal-wrap">
                    {offCalendarOpen ? (
                      <>
                        <div className="off-cal-head">
                          <button className="week-inline-btn off-month-label-btn" type="button" onClick={() => setSelectedDate(getTodayIsoHCM())}>
                            Tháng này
                          </button>
                          <button className="week-inline-btn off-next-month-btn" type="button" onClick={() => setSelectedDate(shiftMonthIso(selectedDate, 1))}>
                            Tháng sau <i className="fa-solid fa-chevron-right" />
                          </button>
                        </div>
                        <div className="off-cal-weekdays">
                          {["T2", "T3", "T4", "T5", "T6", "T7", "CN"].map((w) => <span key={`wk-${w}`}>{w}</span>)}
                        </div>
                        <div className="off-cal-grid">
                          {offCalendarCells.map((cell, idx) => {
                            if (!cell) return <div key={`off-empty-${idx}`} className="off-cal-empty" />;
                            const levelCls = cell.offCount >= 3 ? "lv3" : cell.offCount === 2 ? "lv2" : cell.offCount === 1 ? "lv1" : "";
                            return (
                              <button
                                key={cell.iso}
                                type="button"
                                className={`off-day-btn ${levelCls} ${selectedDate === cell.iso ? "selected" : ""}`}
                                disabled={cell.iso < todayIso}
                                onClick={() => { setSelectedDate(cell.iso); setSetupOpen(true); }}
                                title={`${formatDateVN(cell.iso)} • OFF: ${cell.offCount}`}
                              >
                                <span>{String(cell.day).padStart(2, "0")}</span>
                                <small>{cell.offCount > 0 ? `OFF ${cell.offCount}` : "-"}</small>
                              </button>
                            );
                          })}
                        </div>
                      </>
                    ) : (
                      <div className="table-wrap" style={{ maxHeight: "34dvh" }}>
                        <table className="off-list-table">
                          <thead>
                            <tr>
                              <th>Nhân viên</th>
                              <th>Ngày nghỉ</th>
                              <th>Lý do</th>
                            </tr>
                          </thead>
                          <tbody>
                            {offRows.map((r) => (
                              <tr
                                key={`${r.dayIso}-${r.staffId}`}
                                className={r.dayIso < todayIso ? "off-row-past" : ""}
                              >
                                <td className="off-name-cell" style={{ color: "#fbbf24", fontWeight: 800 }}>{r.name}</td>
                                <td className="off-day-cell">{formatDateVN(r.dayIso)}</td>
                                <td className="off-reason-cell">
                                  <button
                                    type="button"
                                    className="off-reason-btn"
                                    onClick={() => {
                                      setOffReasonPreview({
                                        name: r.name,
                                        dayIso: r.dayIso,
                                        reason: r.reason || "-"
                                      });
                                    }}
                                    title={r.reason || "-"}
                                  >
                                    {r.reason || "-"}
                                  </button>
                                </td>
                              </tr>
                            ))}
                            {offRows.length === 0 ? (
                              <tr>
                                <td colSpan="3" style={{ textAlign: "center", color: "rgba(255,255,255,.6)" }}>Chưa có đăng ký OFF trong tháng</td>
                              </tr>
                            ) : null}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                </div>
              </section>
            </div>
          ) : (
            <section className={`card employee-list-card ${summaryFullScreen ? "summary-fullscreen-card" : ""}`} style={{ flex: 1, minHeight: 0 }}>
              <div className="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th className="summary-th-toggle" onClick={() => setSummaryFullScreen((v) => !v)}>Nhân viên</th>
                      <th className="summary-th-toggle" onClick={() => setSummaryFullScreen((v) => !v)}>Ca làm</th>
                      <th className="summary-th-toggle" onClick={() => setSummaryFullScreen((v) => !v)}>Giờ làm</th>
                      <th className="summary-th-toggle" onClick={() => setSummaryFullScreen((v) => !v)}>Trạng thái</th>
                    </tr>
                  </thead>
                  <tbody>
                    {(() => {
                      return summaryEmployees.map((emp) => {
                        const data = scheduleData[selectedDate]?.[emp.id] || { shifts: [], isOff: false };
                        const punchIns = punchInTimesMap[emp.id] || punchInMap[emp.id];
                        const preferredSid = summaryShiftViewByEmp[emp.id];
                        const status = getAttendanceStatus(data, punchIns, nowMinuteTick, preferredSid);
                        return (
                          <tr key={emp.id}>
                            <td className="summary-staff-cell">
                              <button
                                type="button"
                                className="staff-name-btn"
                                disabled={!canEditSummaryFilter}
                                onClick={() => {
                                  if (!canEditSummaryFilter) return;
                                  setSummaryFilterOpen(true);
                                }}
                              >
                                {emp.name}
                              </button>
                            </td>
                            <td className="summary-shift-cell">
                              {data.isOff ? "-" : data.shifts.length > 0 ? (
                                <div className="shift-icon-wrap">
                                  {getOrderedShiftIds(data.shifts).map((sid) => {
                                    const activeSid = summaryShiftViewByEmp[emp.id] || getRealtimeShiftId(data, nowMinuteTick);
                                    const shiftStatus = getShiftAttendanceStatus(data, sid, punchIns, nowMinuteTick);
                                    return (
                                      <button
                                        key={`${emp.id}-icon-${sid}`}
                                        type="button"
                                        className={`shift-icon-chip shift-icon-chip-btn status-${shiftStatus.key} ${activeSid === sid ? "active" : ""}`}
                                        title={`${getShiftLabel(sid)} • ${shiftStatus.text}${shiftStatus.deltaLabel ? ` ${shiftStatus.deltaLabel}` : ""}`}
                                        onClick={() => setSummaryShiftViewByEmp((prev) => ({ ...prev, [emp.id]: sid }))}
                                      >
                                        <i className={getShiftIcon(sid)} />
                                      </button>
                                    );
                                  })}
                                </div>
                              ) : (
                                <span title="Chưa đăng ký" style={{ color: "rgba(255,255,255,.35)" }}>
                                  <i className="fa-solid fa-clipboard" />
                                </span>
                              )}
                            </td>
                            <td className="summary-time-cell" style={{ fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace", color: "rgba(255,255,255,.75)" }}>
                              {data.isOff ? "-" : data.shifts.length > 0 ? (
                                <div className="time-chip-wrap">
                                  {(() => {
                                    const orderedShifts = getOrderedShiftIds(data.shifts);
                                    const preferredSid = summaryShiftViewByEmp[emp.id];
                                    const realtimeSid = getRealtimeShiftId(data, nowMinuteTick);
                                    const sid = orderedShifts.includes(preferredSid) ? preferredSid : (realtimeSid || orderedShifts[0]);
                                    return (
                                      <span
                                        className="time-chip"
                                        title={`${getShiftLabel(sid)} • ${getShiftTimeText(data, sid)}`}
                                      >
                                        <span className="time-chip-text">{getShiftTimeText(data, sid)}</span>
                                      </span>
                                    );
                                  })()}
                                </div>
                              ) : "-"}
                            </td>
                            <td>
                              <span className={`tag ${status.key}`}>
                                {status.icon ? <><i className={status.icon} /> </> : null}
                                <span>{status.text}</span>
                                {status.deltaLabel ? <span style={{ marginLeft: 4, fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace" }}>{status.deltaLabel}</span> : null}
                              </span>
                            </td>
                          </tr>
                        );
                      });
                    })()}
                  </tbody>
                </table>
              </div>
            </section>
          )}

          {viewMode === "summary" ? (
            <>
              <button className="calendar-fab" type="button" title="Mở lịch để xem">
                <i className="fa-solid fa-calendar-days" />
              </button>
              <input
                className="calendar-fab-hit"
                type="date"
                value={selectedDate}
                min={todayIso}
                onChange={(e) => e.target.value && setSelectedDate(e.target.value)}
              />
            </>
          ) : null}
          {viewMode === "off" ? (
            <button
              className="off-open-cal-fab"
              type="button"
              title={offCalendarOpen ? "Đóng lịch OFF" : "Mở lịch OFF"}
              onClick={(e) => {
                e.stopPropagation();
                setOffCalendarOpen((v) => !v);
              }}
            >
              <i className={offCalendarOpen ? "fa-solid fa-xmark" : "fa-solid fa-calendar-days"} />
            </button>
          ) : null}

          {notification ? <div className="toast">{notification}</div> : null}
          {offReasonPreview ? (
            <div className="modal-overlay" onClick={() => setOffReasonPreview(null)}>
              <div className="modal-card calendar-modal-card" onClick={(e) => e.stopPropagation()}>
                <div className="modal-head" style={{ justifyContent: "space-between", paddingRight: 0 }}>
                  <span><i className="fa-solid fa-note-sticky" style={{ color: "#fbbf24", marginRight: 8 }} />Lý do nghỉ • {offReasonPreview.name}</span>
                  <button className="icon-btn" onClick={() => setOffReasonPreview(null)} title="Đóng"><i className="fa-solid fa-xmark" /></button>
                </div>
                <div className="setup-placeholder" style={{ textAlign: "left", whiteSpace: "pre-wrap", lineHeight: 1.5 }}>
                  <div style={{ marginBottom: 8, color: "rgba(255,255,255,.6)", fontSize: 11, fontWeight: 800 }}>{formatDateVN(offReasonPreview.dayIso)}</div>
                  <div style={{ color: "#fff" }}>{offReasonPreview.reason || "-"}</div>
                </div>
              </div>
            </div>
          ) : null}
          {summaryFilterOpen ? (
            <div className="modal-overlay" onClick={() => setSummaryFilterOpen(false)}>
              <div className="modal-card calendar-modal-card" onClick={(e) => e.stopPropagation()}>
                <div className="modal-head" style={{ justifyContent: "space-between", paddingRight: 0 }}>
                  <span><i className="fa-solid fa-users-viewfinder" style={{ color: "#fbbf24", marginRight: 8 }} />Tùy chọn hiển thị nhân viên</span>
                  <button className="icon-btn" onClick={() => setSummaryFilterOpen(false)} title="Đóng"><i className="fa-solid fa-xmark" /></button>
                </div>
                <div className="summary-filter-list">
                  {employees.map((e) => (
                    <div key={`filter-${e.id}`} className="summary-filter-item" style={{ display: "grid", gridTemplateColumns: "auto 1fr auto auto", alignItems: "center", gap: 8 }}>
                      <label style={{ display: "inline-flex", alignItems: "center", gap: 6, fontWeight: 800 }}>
                        <input
                          type="checkbox"
                          checked={summaryVisibleIds[e.id] !== false}
                          onChange={(ev) => {
                            const checked = !!ev.target.checked;
                            setSummaryVisibleIds((prev) => ({ ...prev, [e.id]: checked }));
                          }}
                        />
                        <span>Hiện</span>
                      </label>
                      <span style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{e.name}</span>
                      <label style={{ display: "inline-flex", alignItems: "center", gap: 4, fontWeight: 800 }}>
                        <input
                          type="radio"
                          name={`role-${e.id}`}
                          checked={(summaryRoles[e.id] || (e.isManager ? "manager" : "staff")) === "staff"}
                          onChange={() => setSummaryRoles((prev) => ({ ...prev, [e.id]: "staff" }))}
                        />
                        <span>Nhân viên</span>
                      </label>
                      <label style={{ display: "inline-flex", alignItems: "center", gap: 4, fontWeight: 800 }}>
                        <input
                          type="radio"
                          name={`role-${e.id}`}
                          checked={(summaryRoles[e.id] || (e.isManager ? "manager" : "staff")) === "manager"}
                          onChange={() => setSummaryRoles((prev) => ({ ...prev, [e.id]: "manager" }))}
                        />
                        <span>Quản lý</span>
                      </label>
                    </div>
                  ))}
                </div>
                <div className="summary-filter-actions">
                  <button className="week-inline-btn" type="button" onClick={() => {
                    const next = {};
                    employees.forEach((e) => { next[e.id] = true; });
                    setSummaryVisibleIds(next);
                  }}>Hiện tất cả</button>
                  <button className="week-inline-btn" type="button" onClick={() => {
                    const next = {};
                    employees.forEach((e) => { next[e.id] = false; });
                    setSummaryVisibleIds(next);
                  }}>Ẩn tất cả</button>
                  <button className="week-inline-btn" type="button" onClick={() => setSummaryFilterOpen(false)}>Xong</button>
                </div>
              </div>
            </div>
          ) : null}

          {setupOpen ? (
            <div className="modal-overlay" onClick={() => setSetupOpen(false)}>
              <div className="modal-card" onClick={(e) => e.stopPropagation()}>
                <div className="modal-head">
                  <span><i className="fa-solid fa-sliders" style={{ color: "#fbbf24", marginRight: 8 }} />Thiết lập • {new Date(`${selectedDate}T00:00:00`).toLocaleDateString("vi-VN", { weekday: "long", day: "2-digit", month: "2-digit" })}</span>
                  <button className="icon-btn" onClick={() => setSetupOpen(false)} title="Đóng"><i className="fa-solid fa-xmark" /></button>
                </div>

                <div className="action-stack">
                  <div className="shift-grid">
                    {SHIFTS.map((shift) => {
                      const isActive = currentDaySchedule.shifts.includes(shift.id);
                      const isEditing = activeShiftId === shift.id;
                      return (
                        <button
                          key={shift.id}
                          className={`shift-btn ${isActive ? "on" : ""}`}
                          disabled={currentDaySchedule.isOff}
                          onClick={() => toggleShift(shift.id)}
                          style={isEditing ? { boxShadow: "0 0 0 2px rgba(251,191,36,.35) inset" } : undefined}
                        >
                          <i className={shift.icon} />
                          <span>{shift.label}</span>
                              <small>{getShiftTimeText(currentDaySchedule, shift.id)}</small>
                        </button>
                      );
                    })}
                  </div>
                  <div className="time-row">
                    <div className="time-select-row">
                      <div className="time-select-box">
                        <label>Giờ vào</label>
                        <select
                          disabled={currentDaySchedule.isOff || !activeShiftId}
                          value={(activeShiftId ? (currentDaySchedule.shiftTimes?.[activeShiftId]?.start || "--:--") : "--:--")}
                          onChange={(e) => handleShiftTimeChange(e.target.value || "--:--")}
                        >
                          {(activeShiftId ? getStartOptionsForShift(activeShiftId) : []).map((t) => (
                            <option key={`start-${t}`} value={t}>{t}</option>
                          ))}
                        </select>
                      </div>
                      <div className="time-select-box">
                        <label>Giờ về</label>
                        <select
                          disabled={currentDaySchedule.isOff || !activeShiftId}
                          value={(activeShiftId ? (currentDaySchedule.shiftTimes?.[activeShiftId]?.end || SHIFT_RULES[activeShiftId]?.max || "--:--") : "--:--")}
                          onChange={(e) => handleShiftEndChange(e.target.value || "--:--")}
                        >
                          {(activeShiftId ? getEndOptionsForShift(activeShiftId, currentDaySchedule.shiftTimes?.[activeShiftId]?.start || SHIFT_RULES[activeShiftId]?.min) : []).map((t) => (
                            <option key={`end-${t}`} value={t}>{t}</option>
                          ))}
                        </select>
                      </div>
                    <button type="button" className="full-day-btn" onClick={applyFullDayPreset}>Cả ngày</button>
                  </div>
                  </div>
                  <button
                    className={`ghost-btn ${currentDaySchedule.isOff ? "off" : ""}`}
                    onClick={() => {
                      const nextOff = !currentDaySchedule.isOff;
                      setOffReasonInvalid(false);
                      handleUpdateSchedule({
                        isOff: nextOff,
                        shifts: [],
                        shiftTimes: buildEmptyShiftTimes(),
                        offReason: nextOff ? String(currentDaySchedule.offReason || "") : ""
                      });
                      setActiveShiftId("");
                    }}
                  >
                    <i className={currentDaySchedule.isOff ? "fa-solid fa-circle-check" : "fa-solid fa-circle-xmark"} />
                    {currentDaySchedule.isOff ? "Đang OFF (nghỉ)" : "Báo nghỉ hôm nay"}
                  </button>
                  {currentDaySchedule.isOff ? (
                    <>
                      <textarea
                        className={`off-reason-box ${offReasonInvalid && !String(currentDaySchedule.offReason || "").trim() ? "invalid" : ""}`}
                        placeholder="Nhập lý do nghỉ..."
                        value={currentDaySchedule.offReason || ""}
                        onChange={(e) => {
                          const nextReason = e.target.value;
                          if (String(nextReason || "").trim()) setOffReasonInvalid(false);
                          handleUpdateSchedule({ offReason: nextReason, isOff: true });
                        }}
                      />
                    </>
                  ) : null}
                  <button className="solid-btn" onClick={saveScheduleNow}>
                    <i className="fa-solid fa-floppy-disk" /> Lưu lịch ngay
                  </button>
                </div>
              </div>
            </div>
          ) : null}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
<script src="./shared-bottom-nav.js?v20260424_213649"></script>
</body>
</html>
