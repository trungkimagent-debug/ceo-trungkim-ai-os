<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="refresh" content="0; url=/1#+" />
  <title>Kênh riêng Chủ tịch</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #27272a 0%, #09090b 60%, #020617 100%);
      color: #fafafa;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(100%, 420px);
      border-radius: 24px;
      padding: 24px 22px;
      background: rgba(24, 24, 27, 0.92);
      border: 1px solid rgba(244, 114, 182, 0.18);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.42);
      text-align: center;
    }
    .title { font-size: 20px; font-weight: 800; margin: 0 0 10px; }
    .sub { margin: 0; color: #d4d4d8; line-height: 1.5; font-size: 14px; }
    .hint { margin-top: 16px; color: #fbbf24; font-size: 13px; }
    .btn {
      display: inline-grid;
      place-items: center;
      text-decoration: none;
      margin-top: 18px;
      width: 100%;
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-weight: 800;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">Đang mở kênh riêng Chủ tịch...</h1>
    <p class="sub">Nếu máy chưa tự vào lại, bấm nút bên dưới để đi thẳng vào màn mở khóa nội bộ.</p>
    <a class="btn" id="goBtn" href="/1#+">Vào lại ngay</a>
    <div class="hint">Lối này không đi qua trang STAR.</div>
  </div>
  <script>
    (function () {
      const nextUrl = `${window.location.origin}/1?_thkd=${Date.now()}#+`;
      const go = () => window.location.replace(nextUrl);
      const goBtn = document.getElementById('goBtn');
      if (goBtn) {
        goBtn.setAttribute('href', nextUrl);
        goBtn.addEventListener('click', (event) => {
          event.preventDefault();
          go();
        });
      }
      setTimeout(go, 40);
    })();
  </script>
</body>
</html>
